spring:
  application:
    name: inventory-reservation
  datasource:
    url: jdbc:postgresql://localhost:5433/inventory_db
    username: fortna_user
    password: fortna_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379